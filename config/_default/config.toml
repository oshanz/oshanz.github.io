baseURL = "https://oshanz.github.io"
title = "Oshan Wisumperuma Blog"
copyright = "Copyright © 2013-{year} Oshan Wisumperuma. All Rights Reserved."

# Multilingual mode
# defaultContentLanguage = "en"
# defaultContentLanguageInSubdir = true
disableLanguages = ["fr", "zh-cn" ,"zh-tw"] # For disable one or more language

# Pagination
pagination.pagerSize = 6
# paginatePath = "page"

# Disqus
# disqusShortname = "yourdiscussshortname"

# Google analytics
# googleAnalytics = "UA-123-45"

enableRobotsTXT = true

enableEmoji = true

# hasCJKLanguage = true # Turn on it if your content contains Chinese/Japanese/Korean Languages.

pygmentsUseClasses = true

[blackfriday]
  hrefTargetBlank = true

[outputs]
  home = ["HTML", "RSS"]

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
