<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
  <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --nav-bg: rgba(255,255,255,0.85);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0071e3;
      --border: #e8e8ed;
      --code-bg: #f5f5f7;
    }
    [data-theme="dark"] {
      --bg: #2e3440;
      --nav-bg: #2e3440;
      --text: #d8dee9;
      --muted: #616e88;
      --accent: #88c0d0;
      --border: #3b4252;
      --code-bg: #242933;
    }
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem 2rem;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: -1rem -1rem 2rem;
      padding: 0.75rem 1rem;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 6px 6px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    a { color: var(--accent); }
    nav a { margin-right: 1rem; text-decoration: none; }
    .nav-links { display: flex; align-items: center; }
    #theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease;
    }
    #theme-toggle:hover { border-color: var(--accent); }
    #theme-toggle svg { width: 18px; height: 18px; }
    .sun-icon, [data-theme="dark"] .moon-icon { display: block; }
    .moon-icon, [data-theme="dark"] .sun-icon { display: none; }
    h1, h2, h3 { line-height: 1.3; }
    pre { background: var(--code-bg); padding: 1rem; overflow-x: auto; border-radius: 4px; transition: background 0.2s ease; }
    code { background: var(--code-bg); padding: 0.1em 0.3em; border-radius: 3px; transition: background 0.2s ease; }
    pre code { background: none; padding: 0; }
    img { max-width: 100%; }
    footer { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 1rem; color: var(--muted); font-size: 0.9rem; transition: border-color 0.2s ease; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin-bottom: 1.5rem; }
    .post-list .date { color: var(--muted); font-size: 0.85rem; }
  </style>
  {{ $css := resources.Get "css/custom.css" }}
  {{ with $css }}<link rel="stylesheet" href="{{ .RelPermalink }}">{{ end }}
</head>
<body>
  <nav>
    <div class="nav-links">
      <a href="{{ "/" | relURL }}">Home</a>
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <button id="theme-toggle" aria-label="Toggle theme">
      <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
      <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
    </button>
  </nav>
  <script>
    (function() {
      const toggle = document.getElementById('theme-toggle');
      if (!toggle) return;
      toggle.addEventListener('click', function() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    Copyright &copy; 2013–{{ now.Year }} Oshan Wisumperuma. All Rights Reserved.
  </footer>
</body>
</html>
