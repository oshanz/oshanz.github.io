<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem 2rem; line-height: 1.6; }
    nav { margin-bottom: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #0070f3; }
    h1, h2, h3 { line-height: 1.3; }
    pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; border-radius: 4px; }
    code { background: #f5f5f5; padding: 0.1em 0.3em; border-radius: 3px; }
    pre code { background: none; padding: 0; }
    img { max-width: 100%; }
    footer { margin-top: 3rem; border-top: 1px solid #ddd; padding-top: 1rem; color: #666; font-size: 0.9rem; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin-bottom: 1.5rem; }
    .post-list .date { color: #666; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ "/" | relURL }}">Home</a>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  </nav>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ .Site.Copyright }}
  </footer>
</body>
</html>
